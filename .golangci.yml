# =============================================================================
# golangci-lint v2 configuration
# https://golangci-lint.run/usage/configuration/
# =============================================================================

version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  default: standard
  enable:
    # ── Bug Detection ──────────────────────────────────────────────────
    - bodyclose        # Detect unclosed HTTP response bodies
    - noctx            # Detect HTTP requests sent without context.Context
    - sqlclosecheck    # Detect unclosed sql.Rows / sql.Stmt

    # ── Style & Readability ────────────────────────────────────────────
    - misspell         # Detect commonly misspelled English words
    - whitespace       # Detect unnecessary leading/trailing newlines

    # ── Performance ────────────────────────────────────────────────────
    - prealloc         # Suggest preallocating slices when size is known

  settings:
    misspell:
      locale: US
    revive:
      rules:
        - name: exported
          arguments:
            - disableStutteringCheck

  exclusions:
    rules:
      # Test files: relax noctx and bodyclose — httptest doesn't need real contexts
      - path: _test\.go
        linters:
          - bodyclose
          - noctx
      # Allow dot imports in test files (testify, gomock, etc.)
      - path: _test\.go
        text: "dot-imports"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/kirklin/boot-backend-go-clean
