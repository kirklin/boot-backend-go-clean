name: Deploy Test

on:
  push:
    branches: [test]

permissions:
  contents: read
  packages: write

env:
  GO_VERSION: "1.26"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DEPLOY_PATH: /opt/boot-test

jobs:
  build-and-deploy:
    name: Build, Scan & Deploy (Test)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version info
        id: version
        run: |
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build Docker Image (Local Load)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:scanning
          build-args: |
            GOPROXY=https://goproxy.cn,direct
            GIT_COMMIT=${{ steps.version.outputs.commit }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:scanning'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test-${{ steps.version.outputs.commit }}
          build-args: |
            GOPROXY=https://goproxy.cn,direct
            GIT_COMMIT=${{ steps.version.outputs.commit }}

      - name: Copy Deployment Files to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.TEST_SSH_HOST }}
          username: ${{ secrets.TEST_SSH_USER }}
          key: ${{ secrets.TEST_SSH_KEY }}
          port: ${{ secrets.TEST_SSH_PORT || '22' }}
          source: "docker/docker-compose.deploy.yaml,docker/nginx/"
          target: "${{ env.DEPLOY_PATH }}"

      - name: Deploy to Test Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.TEST_SSH_HOST }}
          username: ${{ secrets.TEST_SSH_USER }}
          key: ${{ secrets.TEST_SSH_KEY }}
          port: ${{ secrets.TEST_SSH_PORT || '22' }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd ${{ env.DEPLOY_PATH }}
            cp docker/docker-compose.deploy.yaml docker-compose.yaml
            cp -r docker/nginx .
            sed -i 's/:latest/:test/g' docker-compose.yaml
            docker compose pull
            docker compose up -d --remove-orphans --wait
            docker image prune -f
            echo "✅ Test 部署完成"
