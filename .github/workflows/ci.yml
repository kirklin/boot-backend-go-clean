name: CI

on:
  pull_request:
    branches: [develop, test, main]

permissions:
  contents: read

env:
  GO_VERSION: "1.26"

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Go Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ github.run_id }}
          restore-keys: ${{ runner.os }}-go

      # Stronger Linter: golangci-lint replaces basic gofmt/govet
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

      # Static Application Security Testing (SAST)
      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: ./...

      # Unit testing with coverage
      - name: Unit Tests with Coverage
        run: go test -gcflags=all=-l -count=1 -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v6
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          fail_ci_if_error: false
          files: ./coverage.out
          verbose: true

      # Basic dry-run build to ensure compilation succeeds
      - name: Dry-run Build
        run: |
          go build -o /dev/null ./cmd/main.go
