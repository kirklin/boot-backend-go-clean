# =============================================================================
# Boot Backend Go Clean — 本地开发环境 (Hot-Reload)
# =============================================================================
# 使用方法:
#   make dev          # 启动全部服务（含热重载）
#   make dev-down     # 停止
#
# 修改 Go 代码后，air 会自动检测变更并重新编译，无需手动重启。
# =============================================================================

services:
  ####################### DATABASE #######################
  postgres:
    image: postgres:18
    container_name: ${COMPOSE_PROJECT_NAME:-boot}_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_here}
      POSTGRES_DB: ${DB_NAME:-${COMPOSE_PROJECT_NAME:-app}_db}
      PGDATA: /data/postgres
    ports:
      - "127.0.0.1:${DB_EXPOSED_PORT:-5432}:${DB_PORT:-5432}"
    volumes:
      - postgres_data:/data/postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-${COMPOSE_PROJECT_NAME:-app}_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  ####################### REDIS #######################
  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-boot}_redis
    ports:
      - "127.0.0.1:${REDIS_EXPOSED_PORT:-6379}:${REDIS_PORT:-6379}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - app-network

  ####################### MINIO #######################
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: ${COMPOSE_PROJECT_NAME:-boot}_minio
    command: server /data --console-address ":${MINIO_CONSOLE_PORT:-9001}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "127.0.0.1:${MINIO_EXPOSED_PORT:-9000}:${MINIO_PORT:-9000}"
      - "127.0.0.1:${MINIO_CONSOLE_EXPOSED_PORT:-9001}:${MINIO_CONSOLE_PORT:-9001}"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${MINIO_PORT:-9000}/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - app-network

  ####################### MINIO INIT #######################
  minio-init:
    # 一次性初始化容器：在 MinIO 启动后自动创建所需的存储桶
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: ${COMPOSE_PROJECT_NAME:-boot}_minio_init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_BUCKET: ${MINIO_BUCKET:-${COMPOSE_PROJECT_NAME:-boot}}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:$${MINIO_PORT} $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY};
        mc mb --ignore-existing local/$${MINIO_BUCKET};
        echo '✅ MinIO 初始化完成：存储桶 '$${MINIO_BUCKET}' 已就绪';
        exit 0;
      "
    networks:
      - app-network
    restart: on-failure

  ####################### BACKEND API #######################
  api:
    container_name: ${COMPOSE_PROJECT_NAME:-boot}_api
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    environment:
      - APP_ENVIRONMENT=${APP_ENVIRONMENT:-development}
      - SERVER_PORT=${SERVER_PORT:-8888}
      - DB_TYPE=${DB_TYPE:-postgres}
      - DB_HOST=postgres
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-secure_password_here}
      - DB_NAME=${DB_NAME:-${COMPOSE_PROJECT_NAME:-app}_db}
      - DB_SSL_MODE=${DB_SSL_MODE:-disable}
      - REDIS_ADDR=redis:${REDIS_PORT:-6379}
      - MINIO_ENDPOINT=minio:${MINIO_PORT:-9000}
    volumes:
      - .:/app
      - go-modules:/go/pkg/mod
      # 使用匿名卷保存 tmp 目录（air 编译产物），不同步到宿主机
      - /app/tmp
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${SERVER_PORT:-8888}/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - app-network

  ####################### GATEWAY (Nginx) #######################
  gateway:
    image: nginx:mainline-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-boot}_gateway
    environment:
      - SERVER_PORT=${SERVER_PORT:-8888}
      - GATEWAY_PORT=${GATEWAY_PORT:-8888}
    volumes:
      - ./docker/nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    ports:
      # Nginx Gateway now listens on GATEWAY_PORT
      - "127.0.0.1:${GATEWAY_PORT:-8888}:${GATEWAY_PORT:-8888}"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${GATEWAY_PORT:-8888}/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - app-network

  ####################### OBSERVABILITY #######################
  prometheus:
    image: prom/prometheus:latest
    container_name: ${COMPOSE_PROJECT_NAME:-boot}_prometheus
    environment:
      - SERVER_PORT=${SERVER_PORT:-8888}
    entrypoint:
      - /bin/sh
      - -c
      - |
        sed "s/\$${SERVER_PORT}/$$SERVER_PORT/g" /etc/prometheus/prometheus.yml.template > /etc/prometheus/prometheus.yml
        /bin/prometheus --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./docker/prometheus/prometheus.yml.template:/etc/prometheus/prometheus.yml.template:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - app-network

  grafana:
    image: grafana/grafana:latest
    container_name: ${COMPOSE_PROJECT_NAME:-boot}_grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
      - ./docker/grafana/dashboards:/etc/grafana/dashboards
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-9091}:3000"
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - app-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  go-modules:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  app-network:
    driver: bridge
