# =============================================================================
# Boot Backend Go Clean — 本地开发环境 (Hot-Reload)
# =============================================================================
# 使用方法:
#   make dev          # 启动全部服务（含热重载）
#   make dev-down     # 停止
#
# 修改 Go 代码后，air 会自动检测变更并重新编译，无需手动重启。
# =============================================================================

services:
  ####################### DATABASE #######################
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_here}
      POSTGRES_DB: ${DB_NAME:-${COMPOSE_PROJECT_NAME:-app}_db}
      PGDATA: /data/postgres
    ports:
      - "127.0.0.1:${DB_EXPOSED_PORT:-5432}:${DB_PORT:-5432}"
    volumes:
      - postgres_data:/data/postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-${COMPOSE_PROJECT_NAME:-app}_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  ####################### BACKEND API #######################
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    environment:
      - APP_ENVIRONMENT=${APP_ENVIRONMENT:-development}
      - SERVER_PORT=${SERVER_PORT:-8888}
      - DB_TYPE=${DB_TYPE:-postgres}
      - DB_HOST=postgres
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-secure_password_here}
      - DB_NAME=${DB_NAME:-${COMPOSE_PROJECT_NAME:-app}_db}
      - DB_SSL_MODE=${DB_SSL_MODE:-disable}
    volumes:
      - .:/app
      - go-modules:/go/pkg/mod
      # 使用匿名卷保存 tmp 目录（air 编译产物），不同步到宿主机
      - /app/tmp
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  ####################### GATEWAY (Nginx) #######################
  gateway:
    image: nginx:mainline-alpine
    environment:
      - SERVER_PORT=${SERVER_PORT:-8888}
      - GATEWAY_PORT=${GATEWAY_PORT:-8888}
    volumes:
      - ./docker/nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    ports:
      # Nginx Gateway now listens on GATEWAY_PORT
      - "127.0.0.1:${GATEWAY_PORT:-8888}:${GATEWAY_PORT:-8888}"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - app-network

volumes:
  postgres_data:
    driver: local
  go-modules:
    driver: local

networks:
  app-network:
    driver: bridge
