# =============================================================================
# Boot Backend Go Clean — Production Docker Compose
# =============================================================================
# Usage:
#   1. Copy this file to your server and rename it to docker-compose.yaml
#   2. Create a .env file and configure the environment variables
#   3. Run: docker compose up -d
# =============================================================================

services:
  web:
    # ⚠️ Adjust the tag appropriately based on your registry
    image: ghcr.io/kirklin/boot-backend-go-clean:latest
    container_name: boot_app
    env_file:
      - .env
    environment:
      DATABASE_HOST: boot_db
    volumes:
      - ./.env:/app/.env:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - app-network

  ####################### DATABASE (PostgreSQL) #######################
  # NOTE: If you use MySQL, replace this service with a mysql image
  db:
    image: postgres:17-alpine
    container_name: boot_db
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-secure_password_here}
      POSTGRES_DB: ${DATABASE_NAME:-boot}
      PGDATA: /data/postgres
    volumes:
      - db_data:/data/postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres} -d ${DATABASE_NAME:-boot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - app-network

  ####################### GATEWAY (Nginx) #######################
  gateway:
    image: nginx:alpine
    container_name: boot_gateway
    environment:
      - APP_PORT=${APP_PORT:-8888}
      - APP_HOST_PORT=${APP_HOST_PORT:-8888}
    volumes:
      - ./docker/nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    ports:
      - "${APP_HOST_PORT:-8888}:${APP_HOST_PORT:-8888}"
    restart: unless-stopped
    networks:
      - app-network

volumes:
  db_data:
    driver: local

networks:
  app-network:
    driver: bridge
