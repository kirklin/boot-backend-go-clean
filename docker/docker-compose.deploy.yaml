# =============================================================================
# Boot Backend Go Clean — Production Docker Compose
# =============================================================================
# Usage:
#   1. Copy this file to your server and rename it to docker-compose.yaml
#   2. Create a .env file and configure the environment variables
#   3. Run: docker compose up -d
# =============================================================================

services:
  ####################### DATABASE #######################
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_here}
      POSTGRES_DB: ${DB_NAME:-${COMPOSE_PROJECT_NAME:-app}_db}
      PGDATA: /data/postgres
    volumes:
      - db_data:/data/postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-${COMPOSE_PROJECT_NAME:-app}_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  ####################### BACKEND API #######################
  api:
    image: ${DOCKER_IMAGE:-ghcr.io/kirklin/boot-backend-go-clean}:${TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
    volumes:
      - ./.env:/app/.env:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  ####################### GATEWAY (Nginx) #######################
  gateway:
    image: nginx:alpine
    environment:
      - SERVER_PORT=${SERVER_PORT:-8888}
      - GATEWAY_PORT=${GATEWAY_PORT:-8888}
    volumes:
      - ./docker/nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    ports:
      - "${GATEWAY_PORT:-8888}:${GATEWAY_PORT:-8888}"
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - app-network

volumes:
  db_data:
    driver: local

networks:
  app-network:
    driver: bridge
