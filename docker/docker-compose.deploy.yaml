# =============================================================================
# Boot Backend Go Clean — Production Docker Compose
# =============================================================================
# Usage:
#   1. Copy this file to your server and rename it to docker-compose.yaml
#   2. Create a .env file and configure the environment variables
#   3. Run: docker compose up -d
# =============================================================================

services:
  ####################### DATABASE #######################
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_here}
      POSTGRES_DB: ${DB_NAME:-${COMPOSE_PROJECT_NAME:-app}_db}
      PGDATA: /data/postgres
    volumes:
      - db_data:/data/postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-${COMPOSE_PROJECT_NAME:-app}_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  ####################### BACKEND API #######################
  api:
    image: ${DOCKER_IMAGE:-ghcr.io/kirklin/boot-backend-go-clean}:${TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
    volumes:
      - ./.env:/app/.env:ro
    healthcheck:
      test: ["/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  ####################### GATEWAY (Nginx) #######################
  gateway:
    image: nginx:mainline-alpine
    environment:
      - SERVER_PORT=${SERVER_PORT:-8888}
      - GATEWAY_PORT=${GATEWAY_PORT:-8888}
    volumes:
      - ./docker/nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    ports:
      - "${GATEWAY_PORT:-8888}:${GATEWAY_PORT:-8888}"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app-network

  ####################### OBSERVABILITY #######################
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    environment:
      - SERVER_PORT=${SERVER_PORT:-8888}
    entrypoint:
      - /bin/sh
      - -c
      - |
        sed "s/\$${SERVER_PORT}/$$SERVER_PORT/g" /etc/prometheus/prometheus.yml.template > /etc/prometheus/prometheus.yml
        /bin/prometheus --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./docker/prometheus/prometheus.yml.template:/etc/prometheus/prometheus.yml.template:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - app-network

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-9091}:3000"
    depends_on:
      - prometheus
    networks:
      - app-network

volumes:
  db_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  app-network:
    driver: bridge
