# mockery configuration
# Docs: https://vektra.github.io/mockery/latest/configuration/
#
# Generate mocks:  make mock
# Mocks output to:  internal/testutil/mock/
#
# When you add a new interface to domain/, add it to the 'interfaces' section
# below and run `make mock` to regenerate.

with-expecter: true
disable-version-string: true
resolve-type-alias: false
issue-845-fix: true
dir: "internal/testutil/mock"
outpkg: "mock"
mockname: "Mock{{.InterfaceName}}"
filename: "mock_{{.InterfaceName | snakecase}}.go"

packages:
  github.com/kirklin/boot-backend-go-clean/internal/domain/repository:
    interfaces:
      UserRepository:
      TxManager:
  github.com/kirklin/boot-backend-go-clean/internal/domain/gateway:
    interfaces:
      Authenticator:
  github.com/kirklin/boot-backend-go-clean/internal/domain/usecase:
    interfaces:
      AuthUseCase:
      UserUseCase:
